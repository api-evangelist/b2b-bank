name: B2B Bank
kind: company
description: >-
  B2B Bank is a Schedule I Canadian bank, headquartered in Toronto and wholly
  owned by Laurentian Bank of Canada (Laurentian Bank Financial Group). It
  operates a business-to-business, intermediary-only model: rather than serving
  retail consumers directly, it manufactures and distributes banking products
  through a network of roughly 27,000 financial professionals — financial
  advisors and their dealerships, deposit and mortgage brokers and their firms,
  mutual fund and insurance manufacturers, and CIRO (formerly MFDA/IIROC)
  members. Its product lines include investment loans, RSP and TFSA loans,
  broker deposits (GICs and high-interest savings/investment accounts), broker
  mortgages, and investment and banking accounts. The bank became a Schedule I
  bank and adopted the B2B Bank name in 2012, consolidating predecessor trust
  businesses (North American Trust, Sun Life Trust), and its deposits are CDIC
  insured. On open finance, B2B Bank publishes no first-party developer portal
  or public API: developer.b2bbank.com and api.b2bbank.com do not resolve, and
  the public site exposes only gated advisor/broker applications (Advisor
  Access, EASE online loans, Group Access, Investor Access, online banking).
  Canada's Consumer-Driven Banking framework is legislated but not yet
  operational, and the bank documents no FDX participation, Interac data-sharing
  API, or aggregator program of its own — consistent with an intermediary bank
  whose digital surface is partner-gated rather than developer-facing.
